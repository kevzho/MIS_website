<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Log In | Minorities in STEM</title>
    <meta name="description" content="Log in to the Minorities in STEM community workspace.">
    <link rel="stylesheet" href="/assets/styles.css">
    <script src="/assets/site.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <div id="site-header"></div>
    <main id="main">
      <section class="section section-alt" aria-labelledby="login-heading">
        <div class="container contact-layout">
          <div class="content-stack">
            <p class="eyebrow">Log In</p>
            <h1 id="login-heading">Access your community workspace.</h1>
            <p class="lead">Sign in with your name and email to share updates, save your local profile, and open the community board.</p>
          </div>
          <form class="contact-card form-grid" data-login-form>
            <div class="form-row">
              <label for="login-name">Name</label>
              <input id="login-name" name="name" autocomplete="name" required>
            </div>
            <div class="form-row">
              <label for="login-email">Email</label>
              <input id="login-email" name="email" type="email" autocomplete="email" required>
            </div>
            <div class="form-row">
              <label for="login-affiliation">School or Chapter</label>
              <input id="login-affiliation" name="affiliation" autocomplete="organization" placeholder="Woodward Academy">
            </div>
            <button class="button" type="submit">Log In</button>
            <p class="form-note" role="status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>
    <div id="site-footer"></div>
  </body>
</html>
