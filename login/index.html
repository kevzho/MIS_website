<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Log In | Minorities in STEM</title>
    <meta name="description" content="Log in to the Minorities in STEM platform.">
    <link rel="stylesheet" href="/assets/styles.css">
    <script src="/assets/site.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <div id="site-header"></div>
    <main id="main">
      <section class="section section-alt" aria-labelledby="login-heading">
        <div class="container contact-layout">
          <div class="content-stack">
            <p class="eyebrow">Log In</p>
            <h1 id="login-heading">Access your chapter workspace.</h1>
            <p class="lead">This placeholder sign-in keeps the navigation complete while the member portal is being connected.</p>
          </div>
          <form class="contact-card form-grid" data-enhanced-form data-success="Demo login submitted.">
            <div class="form-row">
              <label for="login-email">Email</label>
              <input id="login-email" name="email" type="email" autocomplete="email" required>
            </div>
            <div class="form-row">
              <label for="login-password">Password</label>
              <input id="login-password" name="password" type="password" autocomplete="current-password" required>
            </div>
            <button class="button" type="submit">Log In</button>
            <p class="form-note" role="status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>
    <div id="site-footer"></div>
  </body>
</html>
